<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
RFDMS | Finance Management
</title>


<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;

}


body{

background:#eef2f7;
display:flex;

}



/* SIDEBAR */


.sidebar{

width:260px;
height:100vh;

position:fixed;

background:
linear-gradient(
180deg,
#061a40,
#0b6623
);

color:white;

padding:25px;

}


.logo{

text-align:center;
margin-bottom:35px;

}


.logo h1{

font-size:35px;
color:#ffd700;

}




.menu a{

display:block;

padding:14px;

margin:8px 0;

color:white;

text-decoration:none;

border-radius:10px;

}



.menu a:hover{

background:rgba(255,255,255,.2);

}







/* MAIN */

.main{

margin-left:260px;

padding:25px;

width:100%;

}




.header{

background:white;

padding:20px;

border-radius:15px;

display:flex;

justify-content:space-between;

box-shadow:0 5px 20px #ddd;

}


.header h2{

color:#061a40;

}








/* CARDS */


.cards{

display:grid;

grid-template-columns:
repeat(4,1fr);

gap:20px;

margin-top:25px;

}


.card{

background:white;

padding:25px;

border-radius:15px;

box-shadow:0 5px 15px #ddd;

}



.card h1{

font-size:32px;

color:#061a40;

}







.panel{

background:white;

padding:25px;

border-radius:15px;

margin-top:25px;

box-shadow:0 5px15px #ddd;

}




input,
select{

padding:12px;

margin:7px;

border-radius:8px;

border:1px solid #ccc;

}




button{

background:#061a40;

color:white;

padding:12px 20px;

border:none;

border-radius:8px;

cursor:pointer;

}



button:hover{

background:#0b6623;

}







table{

width:100%;

border-collapse:collapse;

margin-top:20px;

}



th{

background:#061a40;

color:white;

}


td,th{

padding:12px;

border-bottom:1px solid #ddd;

text-align:center;

}




.income{

color:green;

font-weight:bold;

}


.expense{

color:red;

font-weight:bold;

}



.delete{

background:#dc2626;

}



.search{

width:300px;

}







@media(max-width:900px){


.sidebar{

width:80px;

}


.main{

margin-left:80px;

}


.cards{

grid-template-columns:1fr;

}


}


</style>


</head>



<body>




<div class="sidebar">


<div class="logo">


<h1>
⚽ RFDMS
</h1>


<p>
FINANCE CENTER
</p>


</div>




<div class="menu">


<a>
🏠 Dashboard
</a>


<a>
🏟 Clubs
</a>


<a>
👤 Players
</a>


<a>
🔄 Transfers
</a>


<a>
💰 Finance
</a>


<a>
📊 Analytics
</a>


<a>
⚙ Settings
</a>


</div>


</div>








<div class="main">



<div class="header">


<h2>
💰 FOOTBALL FINANCE MANAGEMENT
</h2>


<b>
FINANCE ADMIN
</b>


</div>







<div class="cards">


<div class="card">

<h1 id="income">
0
</h1>

<p>
Total Revenue
</p>

</div>




<div class="card">

<h1 id="expense">
0
</h1>

<p>
Total Expenses
</p>

</div>





<div class="card">

<h1 id="balance">
0
</h1>

<p>
Balance
</p>

</div>





<div class="card">

<h1>
2026
</h1>

<p>
Financial Year
</p>

</div>


</div>








<div class="panel">


<h2>
➕ Add Transaction
</h2>


<br>


<input
id="title"
placeholder="Transaction Name"
>



<input

id="amount"

type="number"

placeholder="Amount RWF"

>



<select id="type">


<option>
Transaction Type
</option>


<option>
Income
</option>


<option>
Expense
</option>



</select>





<select id="category">


<option>
Category
</option>


<option>
Sponsorship
</option>


<option>
Ticket Sales
</option>


<option>
Transfer Fee
</option>


<option>
Salary
</option>


<option>
Medical
</option>


<option>
Equipment
</option>


</select>






<button onclick="addTransaction()">

SAVE TRANSACTION

</button>



</div>








<div class="panel">


<h2>
📋 Financial Transactions
</h2>



<br>


<input

class="search"

id="search"

placeholder="Search transaction..."

onkeyup="searchTransaction()"

>




<table>


<thead>


<tr>


<th>
Name
</th>


<th>
Amount
</th>


<th>
Type
</th>


<th>
Category
</th>


<th>
Action
</th>


</tr>


</thead>



<tbody id="transactions">

</tbody>



</table>



</div>










<script>



let transactions =
JSON.parse(
localStorage.getItem("rfdms_finance")
)
||
[];







function addTransaction(){



let data={


title:
document.getElementById("title").value,


amount:
Number(
document.getElementById("amount").value
),


type:
document.getElementById("type").value,


category:
document.getElementById("category").value



};



transactions.push(data);



localStorage.setItem(

"rfdms_finance",

JSON.stringify(transactions)

);



display();



}









function display(){


let table =
document.getElementById("transactions");


table.innerHTML="";



let income=0;

let expense=0;




transactions.forEach(
(t,i)=>{


if(t.type=="Income")
income+=t.amount;


if(t.type=="Expense")
expense+=t.amount;



table.innerHTML+=`


<tr>


<td>
${t.title}
</td>


<td>
${t.amount.toLocaleString()} RWF
</td>


<td class="${
t.type=="Income"
?"income"
:"expense"
}">

${t.type}

</td>


<td>
${t.category}
</td>


<td>


<button

class="delete"

onclick="remove(${i})">

Delete

</button>


</td>



</tr>


`;



});





document.getElementById("income")
.innerHTML =
income.toLocaleString();



document.getElementById("expense")
.innerHTML =
expense.toLocaleString();



document.getElementById("balance")
.innerHTML =
(
income-expense
)
.toLocaleString();



}







function remove(i){


transactions.splice(i,1);



localStorage.setItem(

"rfdms_finance",

JSON.stringify(transactions)

);



display();


}






function searchTransaction(){


let value=
document
.getElementById("search")
.value
.toLowerCase();



document
.querySelectorAll("#transactions tr")
.forEach(row=>{


row.style.display=

row.innerText
.toLowerCase()
.includes(value)

?
""
:
"none";



});


}





display();



</script>



</body>

</html>
