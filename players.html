<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
RFDMS | Player Management
</title>


<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;

}


body{

background:#f1f5f9;

}


/* HEADER */

.header{

background:
linear-gradient(
135deg,
#061a40,
#0b6623
);

color:white;

padding:25px;

display:flex;

justify-content:space-between;

align-items:center;

}


.header h1{

color:#ffd700;

}



/* CONTAINER */


.container{

padding:30px;

}



/* FORM */


.form-box{

background:white;

padding:25px;

border-radius:15px;

box-shadow:0 5px 20px #ddd;

margin-bottom:25px;

}



input,
select{

padding:12px;

margin:8px;

border:1px solid #ccc;

border-radius:8px;

}


button{

padding:12px 20px;

background:#061a40;

color:white;

border:none;

border-radius:8px;

cursor:pointer;

}


button:hover{

background:#0b6623;

}




/* PLAYER TABLE */


.table-box{

background:white;

padding:25px;

border-radius:15px;

}


table{

width:100%;

border-collapse:collapse;

}



th{

background:#061a40;

color:white;

}


th,td{

padding:12px;

border-bottom:1px solid #ddd;

text-align:center;

}



.delete{

background:#dc2626;

padding:8px;

border-radius:6px;

}



.search{

width:300px;

margin-bottom:20px;

}



</style>


</head>


<body>



<div class="header">

<h1>
⚽ RFDMS PLAYER MANAGEMENT
</h1>


<p>
FERWAFA ADMIN
</p>


</div>




<div class="container">



<div class="form-box">


<h2>
Register New Player
</h2>


<br>


<input 
id="name"
placeholder="Player Name"
>


<input
id="age"
type="number"
placeholder="Age"
>


<input
id="country"
placeholder="Nationality"
>



<select id="club">


<option>
Select Club
</option>


<option>
APR FC
</option>


<option>
Rayon Sports
</option>


<option>
Police FC
</option>


<option>
AS Kigali
</option>


</select>




<select id="position">


<option>
Position
</option>


<option>
Goalkeeper
</option>


<option>
Defender
</option>


<option>
Midfielder
</option>


<option>
Forward
</option>


</select>




<button onclick="addPlayer()">

ADD PLAYER

</button>



</div>






<div class="table-box">


<h2>
Registered Players
</h2>


<br>


<input
class="search"
placeholder="Search player..."
onkeyup="searchPlayer()"
id="search"
>




<table>


<thead>

<tr>

<th>
Name
</th>


<th>
Age
</th>


<th>
Country
</th>


<th>
Club
</th>


<th>
Position
</th>


<th>
Action
</th>


</tr>


</thead>


<tbody id="players">


</tbody>


</table>



</div>




</div>







<script>


let players =
JSON.parse(localStorage.getItem("players"))
|| [];



function displayPlayers(){


let table =
document.getElementById("players");


table.innerHTML="";



players.forEach(
(player,index)=>{


table.innerHTML += `

<tr>

<td>${player.name}</td>

<td>${player.age}</td>

<td>${player.country}</td>

<td>${player.club}</td>

<td>${player.position}</td>


<td>

<button 
class="delete"
onclick="deletePlayer(${index})">

Delete

</button>

</td>


</tr>

`;



});


}



function addPlayer(){



let player={


name:
document.getElementById("name").value,


age:
document.getElementById("age").value,


country:
document.getElementById("country").value,


club:
document.getElementById("club").value,


position:
document.getElementById("position").value


};



players.push(player);


localStorage.setItem(
"players",
JSON.stringify(players)
);



displayPlayers();



}




function deletePlayer(index){


players.splice(index,1);


localStorage.setItem(
"players",
JSON.stringify(players)
);


displayPlayers();


}




function searchPlayer(){


let value =
document
.getElementById("search")
.value
.toLowerCase();



let rows =
document
.querySelectorAll("#players tr");



rows.forEach(row=>{


row.style.display =
row.innerText
.toLowerCase()
.includes(value)
?
""
:
"none";


});


}



displayPlayers();


</script>



</body>

</html>
