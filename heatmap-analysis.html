<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>RFDMS | AI Heatmap Analysis</title>


<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">


<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}


body{

background:
radial-gradient(circle,#14532d,#020617);

color:white;

padding:25px;

}



/* HEADER */


.header{

display:flex;

justify-content:space-between;

align-items:center;

background:
rgba(255,255,255,.08);

padding:25px;

border-radius:25px;

backdrop-filter:blur(20px);

}


.logo{

font-size:32px;

font-weight:900;

}


.logo span{

color:#22c55e;

}



.ai{

background:#22c55e;

color:#020617;

padding:12px 25px;

border-radius:30px;

font-weight:bold;

}





/* MAIN */


.container{

margin-top:30px;

display:grid;

grid-template-columns:3fr 1fr;

gap:25px;

}





/* PITCH */


.pitch{

height:700px;

background:

linear-gradient(#16a34a,#15803d);

border-radius:35px;

border:5px solid white;

position:relative;

overflow:hidden;

}




.pitch:before{

content:"";

position:absolute;

left:50%;

height:100%;

width:3px;

background:white;

}



.circle{

position:absolute;

width:130px;

height:130px;

border:3px solid white;

border-radius:50%;

left:50%;

top:50%;

transform:translate(-50%,-50%);

}







/* HEAT ZONES */


.heat{

position:absolute;

border-radius:50%;

filter:blur(25px);

animation:heat 3s infinite alternate;

}



@keyframes heat{

from{

opacity:.5;

}


to{

opacity:.9;

}

}



.red{

background:red;

}



.orange{

background:orange;

}



.yellow{

background:yellow;

}







/* PLAYER */


.player{

position:absolute;

width:55px;

height:55px;

background:white;

color:black;

border-radius:50%;

display:flex;

align-items:center;

justify-content:center;

font-weight:bold;

border:3px solid #22c55e;

}





/* PANEL */


.panel{

background:

rgba(255,255,255,.08);

padding:25px;

border-radius:30px;

}



.panel h2{

color:#22c55e;

margin-bottom:20px;

}




.metric{

display:flex;

justify-content:space-between;

background:

rgba(255,255,255,.08);

padding:15px;

border-radius:15px;

margin:12px 0;

}



.value{

color:#22c55e;

font-weight:bold;

}





.bar{

height:12px;

background:#334155;

border-radius:20px;

}



.bar div{

height:100%;

background:#22c55e;

border-radius:20px;

}




.ai-box{

margin-top:25px;

padding:20px;

background:

rgba(34,197,94,.15);

border-radius:20px;

}



@media(max-width:900px){

.container{

grid-template-columns:1fr;

}

}


</style>

</head>


<body>




<div class="header">


<div class="logo">

🔥⚽

<span>RFDMS AI Heatmap</span>

</div>


<div class="ai">

AI ANALYSIS ACTIVE

</div>


</div>







<div class="container">





<div class="pitch">


<div class="circle"></div>



<!-- HEAT ZONES -->


<div class="heat red"

style="width:180px;height:180px;top:25%;left:55%;">

</div>



<div class="heat orange"

style="width:160px;height:160px;top:45%;left:35%;">

</div>



<div class="heat yellow"

style="width:120px;height:120px;top:65%;left:50%;">

</div>







<!-- PLAYER POSITION -->


<div class="player"

style="top:45%;left:50%;">

10

</div>



<div class="player"

style="top:25%;left:70%;">

RW

</div>



<div class="player"

style="top:65%;left:35%;">

8

</div>




</div>









<div class="panel">


<h2>

Player Analysis

</h2>



<div class="metric">

Player

<span class="value">

Viateur

</span>

</div>



<div class="metric">

Position

<span class="value">

CAM

</span>

</div>



<div class="metric">

Distance

<span class="value">

11.2 KM

</span>

</div>



<div class="metric">

Touches

<span class="value">

78

</span>

</div>



<div class="metric">

Key Passes

<span class="value">

14

</span>

</div>





<h2>

Zone Control

</h2>



Attack


<div class="bar">

<div style="width:92%"></div>

</div>




Midfield


<div class="bar">

<div style="width:88%"></div>

</div>




Defense


<div class="bar">

<div style="width:60%"></div>

</div>







<div class="ai-box">


🤖 AI Recommendation


<br><br>


Player is highly effective in:

<br>

✅ Central attacking zones

<br>

✅ Creative midfield role

<br>

✅ Ball progression


</div>



</div>





</div>







</body>

</html>
