<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RFDMS | Tactical Board</title>


<style>


*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;

}


body{


background:

linear-gradient(135deg,#020617,#052e16);


color:white;

padding:25px;


}



.header{


display:flex;

justify-content:space-between;

align-items:center;


background:

rgba(255,255,255,.08);


padding:20px;


border-radius:25px;


}


.logo{

font-size:30px;

font-weight:900;

}


.logo span{

color:#22c55e;

}




button{


padding:12px 25px;

border:none;

border-radius:25px;

background:#22c55e;

font-weight:bold;


}





.container{


margin-top:30px;


display:grid;


grid-template-columns:3fr 1fr;


gap:25px;


}





/* FOOTBALL PITCH */


.pitch{


height:650px;


background:

linear-gradient(

90deg,

#16a34a,

#15803d

);


border-radius:25px;


position:relative;


border:

5px solid white;


overflow:hidden;


}



/* LINES */


.pitch:before{


content:"";


position:absolute;


left:50%;


top:0;


height:100%;


width:3px;


background:white;


}



.circle{


position:absolute;


width:120px;

height:120px;


border:3px solid white;


border-radius:50%;


top:50%;


left:50%;


transform:translate(-50%,-50%);


}




.player{


position:absolute;


width:65px;


height:65px;


border-radius:50%;


background:#ffffff;


color:#020617;


display:flex;


align-items:center;


justify-content:center;


font-weight:bold;


cursor:grab;


border:3px solid #22c55e;


}



.player:hover{


transform:scale(1.1);


}




/* CONTROL PANEL */


.panel{


background:

rgba(255,255,255,.08);


padding:25px;


border-radius:25px;


}



.panel h2{


color:#22c55e;


margin-bottom:20px;


}



select,textarea{


width:100%;


padding:12px;


margin-bottom:15px;


border-radius:15px;


border:none;


}





textarea{


height:120px;


}




.formations{


display:grid;


grid-template-columns:1fr 1fr;


gap:10px;


}



.formation{


background:

rgba(255,255,255,.1);


padding:15px;


text-align:center;


border-radius:15px;


cursor:pointer;


}



.formation:hover{


background:#22c55e;

color:#020617;


}





@media(max-width:900px){


.container{


grid-template-columns:1fr;


}


}




</style>


</head>




<body>




<div class="header">


<div class="logo">

🧠⚽

<span>RFDMS Tactical Board</span>

</div>


<button>

Save Tactic

</button>


</div>









<div class="container">





<div class="pitch" id="pitch">



<div class="circle"></div>



<div class="player" style="top:80%;left:45%">

GK

</div>




<div class="player" style="top:65%;left:20%">

LB

</div>



<div class="player" style="top:65%;left:40%">

CB

</div>




<div class="player" style="top:65%;left:60%">

CB

</div>




<div class="player" style="top:65%;left:80%">

RB

</div>





<div class="player" style="top:45%;left:35%">

CM

</div>




<div class="player" style="top:45%;left:65%">

CM

</div>




<div class="player" style="top:35%;left:50%">

CAM

</div>





<div class="player" style="top:20%;left:25%">

LW

</div>



<div class="player" style="top:20%;left:50%">

ST

</div>




<div class="player" style="top:20%;left:75%">

RW

</div>



</div>









<div class="panel">


<h2>

⚙ Tactical Settings

</h2>




<select>

<option>

4-3-3 Attack

</option>


<option>

4-4-2 Classic

</option>


<option>

3-5-2 Control

</option>


<option>

5-3-2 Defensive

</option>


</select>






<h2>

Quick Formations

</h2>




<div class="formations">


<div class="formation">

4-3-3

</div>


<div class="formation">

4-4-2

</div>


<div class="formation">

3-5-2

</div>


<div class="formation">

4-2-3-1

</div>



</div>






<h2 style="margin-top:25px">

Coach Notes

</h2>



<textarea placeholder="Enter tactical instructions..."></textarea>




<button style="width:100%">

Analyze Tactic 🤖

</button>



</div>






</div>






<script>


// DRAG PLAYERS

let players=document.querySelectorAll(".player");


players.forEach(player=>{


player.onmousedown=function(e){


let shiftX=e.clientX-player.getBoundingClientRect().left;

let shiftY=e.clientY-player.getBoundingClientRect().top;



function moveAt(pageX,pageY){


player.style.left=

pageX-shiftX-

document.getElementById("pitch").offsetLeft+"px";


player.style.top=

pageY-shiftY-

document.getElementById("pitch").offsetTop+"px";


}



function move(e){

moveAt(e.pageX,e.pageY);

}



document.addEventListener("mousemove",move);



player.onmouseup=function(){


document.removeEventListener("mousemove",move);


player.onmouseup=null;


}



}


});



</script>



</body>

</html>
