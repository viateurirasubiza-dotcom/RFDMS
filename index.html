<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
RFDMS | Rwanda Football Digital Management System
</title>


<style>

/* =========================
   GLOBAL STYLE
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}


body{

    min-height:100vh;

    background:
    linear-gradient(
        135deg,
        #061a40,
        #0b6623
    );

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;

}


/* Animated background */

body::before{

content:"";

position:absolute;

width:500px;
height:500px;

background:
radial-gradient(
circle,
rgba(255,255,255,.2),
transparent
);

animation:move 8s infinite alternate;

}


@keyframes move{

from{
transform:translate(-100px,-50px);
}

to{
transform:translate(100px,80px);
}

}



/* =========================
 LOGIN CARD
========================= */


.login-container{

width:420px;

padding:40px;

background:
rgba(255,255,255,.12);

backdrop-filter:blur(15px);

border-radius:20px;

box-shadow:
0 20px 50px rgba(0,0,0,.4);

z-index:2;

}



/* Logo */

.logo{

text-align:center;

margin-bottom:30px;

}


.logo span{

font-size:70px;

}


.logo h1{

font-size:40px;

letter-spacing:5px;

color:#ffd700;

}



.logo p{

font-size:14px;

opacity:.9;

}



/* Login Box */

.login-box h2{

text-align:center;

margin-bottom:25px;

}




input,
select{

width:100%;

padding:14px;

margin-bottom:15px;

border:none;

outline:none;

border-radius:10px;

font-size:15px;

}



button{


width:100%;

padding:14px;

border:none;

border-radius:10px;


background:#ffd700;

color:#061a40;


font-size:18px;

font-weight:bold;


cursor:pointer;

transition:.3s;

}


button:hover{

transform:scale(1.05);

background:white;

}



#message{

text-align:center;

margin-top:15px;

color:#90ee90;

font-weight:bold;

}



/* Footer */

.footer{

text-align:center;

margin-top:25px;

font-size:12px;

opacity:.8;

}



</style>

</head>



<body>



<div class="login-container">



<div class="logo">

<span>
⚽
</span>

<h1>
RFDMS
</h1>


<p>
Rwanda Football Digital Management System
</p>


</div>




<div class="login-box">


<h2>
System Login
</h2>



<input 
type="text"
id="username"
placeholder="Username"
>



<input 
type="password"
id="password"
placeholder="Password"
>



<select id="role">


<option>
Select Role
</option>


<option>
FERWAFA Admin
</option>


<option>
Club Admin
</option>


<option>
Coach
</option>


<option>
Player
</option>


<option>
Referee
</option>


<option>
Medical Staff
</option>


</select>




<button onclick="login()">

LOGIN

</button>



<p id="message"></p>



</div>



<div class="footer">

© 2026 RFDMS | Football Digital Transformation Rwanda

</div>



</div>





<script>


function login(){


let username =
document.getElementById("username").value;


let password =
document.getElementById("password").value;


let role =
document.getElementById("role").value;



if(
username==="" ||
password==="" ||
role==="Select Role"
){


document.getElementById("message").innerHTML=
"Please fill all fields";


return;

}



document.getElementById("message").innerHTML=
"Welcome "+role+" ⚽";


}



</script>



</body>

</html>
