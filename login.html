<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RFDMS | Secure Login</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">


<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}



body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:
linear-gradient(135deg,#020617,#052e16,#020617);

color:white;

overflow-y:auto;

overflow-x:hidden;

padding:30px 0;

}



/* BACKGROUND LIGHTS */


body::before{

content:"";

position:fixed;

width:600px;

height:600px;

background:#22c55e;

filter:blur(180px);

opacity:.25;

top:-200px;

left:-200px;

z-index:0;

}



body::after{

content:"";

position:fixed;

width:500px;

height:500px;

background:#2563eb;

filter:blur(180px);

opacity:.25;

bottom:-200px;

right:-200px;

z-index:0;

}



/* LOGIN BOX */


.container{

width:430px;

max-height:95vh;

overflow-y:auto;

padding:40px;


background:

rgba(255,255,255,.08);


border-radius:35px;


border:

1px solid rgba(255,255,255,.15);


backdrop-filter:blur(25px);


box-shadow:

0 0 50px rgba(0,0,0,.5);


z-index:2;


}



/* SCROLLBAR */


.container::-webkit-scrollbar{

width:8px;

}


.container::-webkit-scrollbar-thumb{

background:#22c55e;

border-radius:20px;

}



.container::-webkit-scrollbar-track{

background:rgba(255,255,255,.05);

}





.logo{

text-align:center;

font-size:45px;

margin-bottom:10px;

}


.logo span{

color:#22c55e;

font-weight:900;

}




.subtitle{

text-align:center;

color:#cbd5e1;

margin-bottom:35px;

line-height:1.5;

}





.input-box{

position:relative;

margin-bottom:20px;

}



.input-box i{

position:absolute;

left:18px;

top:17px;

color:#22c55e;

}




input,select{

width:100%;

padding:15px 50px;

border-radius:15px;

border:none;

outline:none;

background:

rgba(255,255,255,.12);

color:white;

font-size:16px;

}



input::placeholder{

color:#cbd5e1;

}



select option{

color:black;

}





.password-eye{

position:absolute;

right:18px;

top:17px;

cursor:pointer;

color:#22c55e;

}





.options{

display:flex;

justify-content:space-between;

align-items:center;

font-size:14px;

color:#cbd5e1;

margin-bottom:25px;

}


.options a{

color:#22c55e;

cursor:pointer;

}




button{

width:100%;

padding:16px;

border:none;

border-radius:30px;

background:#22c55e;

font-size:18px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}



button:hover{

transform:translateY(-4px);

box-shadow:

0 0 30px #22c55e;

}





.divider{

text-align:center;

margin:30px 0;

color:#94a3b8;

}




.roles{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:12px;

}




.role{

padding:15px 5px;

text-align:center;

border-radius:18px;

background:

rgba(255,255,255,.1);

font-size:13px;

cursor:pointer;

transition:.3s;

border:

1px solid rgba(255,255,255,.1);

}



.role:hover{

background:#22c55e;

color:#020617;

transform:translateY(-5px);

}





.footer{

margin-top:30px;

text-align:center;

font-size:13px;

color:#94a3b8;

}





/* MOBILE */


@media(max-width:500px){


body{

align-items:flex-start;

}


.container{

width:92%;

margin-top:20px;

padding:25px;

max-height:none;

}


.logo{

font-size:38px;

}


.roles{

grid-template-columns:repeat(2,1fr);

}


}



</style>

</head>



<body>



<div class="container">



<div class="logo">

🇷🇼⚽

<br>

<span>RFDMS</span>

</div>



<p class="subtitle">

Rwanda Football Digital Management System

<br>

🔐 Secure Access Portal

</p>





<div class="input-box">

<i class="fa-solid fa-user"></i>

<input type="text" placeholder="Username or Email">

</div>






<div class="input-box">


<i class="fa-solid fa-lock"></i>


<input 

id="password"

type="password"

placeholder="Password">


<i 

id="eye"

class="fa-solid fa-eye password-eye"

onclick="showPassword()">

</i>


</div>







<div class="input-box">


<i class="fa-solid fa-user-shield"></i>


<select>


<option>Select Role</option>

<option>FERWAFA Super Admin</option>

<option>Club Admin</option>

<option>Coach</option>

<option>Player</option>

<option>Referee</option>

<option>Medical Staff</option>

<option>Scout</option>

<option>Fan</option>


</select>


</div>







<div class="options">


<label>

<input type="checkbox">

 Remember me

</label>


<a>

Forgot Password?

</a>


</div>






<button onclick="login()">

<i class="fa-solid fa-right-to-bracket"></i>

 Login

</button>







<div class="divider">

Quick Access

</div>





<div class="roles">


<div class="role">

🏢

<br>

FERWAFA

</div>


<div class="role">

🏟️

<br>

Club

</div>


<div class="role">

⚽

<br>

Player

</div>



<div class="role">

👨‍🏫

<br>

Coach

</div>



<div class="role">

👨‍⚖️

<br>

Referee

</div>



<div class="role">

🔎

<br>

Scout

</div>


</div>






<div class="footer">

© 2026 RFDMS

<br>

Future Of Rwandan Football 🇷🇼

</div>




</div>







<script>


function showPassword(){


let pass=document.getElementById("password");

let eye=document.getElementById("eye");


if(pass.type==="password"){

pass.type="text";

eye.className="fa-solid fa-eye-slash password-eye";

}

else{

pass.type="password";

eye.className="fa-solid fa-eye password-eye";

}


}



function login(){


alert("Connecting to RFDMS Secure Portal...");


}


</script>



</body>

</html>
