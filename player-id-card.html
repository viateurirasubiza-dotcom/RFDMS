<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RFDMS | Digital Player ID Card</title>


<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>


<style>


*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;

}



body{


min-height:100vh;


display:flex;

justify-content:center;

align-items:center;


background:

linear-gradient(135deg,#020617,#052e16);


color:white;


padding:30px;


}




.card{


width:420px;


background:

linear-gradient(

145deg,

rgba(34,197,94,.25),

rgba(255,255,255,.08)

);


border-radius:35px;


padding:30px;


border:

1px solid rgba(255,255,255,.2);


backdrop-filter:blur(20px);


box-shadow:

0 0 50px rgba(34,197,94,.4);


}





.header{


text-align:center;


border-bottom:

1px solid rgba(255,255,255,.2);


padding-bottom:20px;


}



.header h1{


font-size:28px;


}



.header span{


color:#22c55e;


}






.photo{


width:150px;

height:150px;


margin:25px auto;


border-radius:50%;


background:#22c55e;


display:flex;


justify-content:center;


align-items:center;


font-size:70px;


border:5px solid white;


}






.name{


text-align:center;


font-size:28px;


font-weight:bold;


}



.position{


text-align:center;


color:#22c55e;


font-size:18px;


}





.info{


margin-top:30px;


display:grid;


grid-template-columns:1fr 1fr;


gap:15px;


}





.box{


background:

rgba(255,255,255,.1);


padding:15px;


border-radius:15px;


}




.box small{


color:#94a3b8;


}




.qr{


display:flex;


justify-content:center;


margin:30px 0;


background:white;


padding:15px;


border-radius:15px;


}





.footer{


text-align:center;


font-size:13px;


color:#94a3b8;


}



button{


width:100%;


margin-top:20px;


padding:15px;


border:none;


border-radius:30px;


background:#22c55e;


font-weight:bold;


font-size:16px;


cursor:pointer;


}



@media(max-width:500px){


.card{


width:95%;


}


}



</style>


</head>



<body>





<div class="card">





<div class="header">


<h1>

🇷🇼 RFDMS

</h1>


<p>

FERWAFA Digital Player Identity Card

</p>


</div>







<div class="photo">

👤

</div>






<div class="name">

Viateur Irasubiza

</div>



<div class="position">

MIDFIELDER

</div>








<div class="info">


<div class="box">

<small>

Player ID

</small>

<br>

RFDMS-2026-001

</div>



<div class="box">

<small>

Club

</small>

<br>

APR FC

</div>



<div class="box">

<small>

Nationality

</small>

<br>

Rwanda 🇷🇼

</div>




<div class="box">

<small>

Jersey

</small>

<br>

10

</div>



<div class="box">

<small>

DOB

</small>

<br>

2005

</div>



<div class="box">

<small>

Status

</small>

<br>

ACTIVE

</div>



</div>








<div class="qr">


<div id="qrcode"></div>


</div>






<div class="footer">


Licensed by FERWAFA

<br>

Rwanda Football Digital Management System


</div>






<button onclick="window.print()">

🖨 Print Player Card

</button>





</div>






<script>


new QRCode(document.getElementById("qrcode"),{


text:

"RFDMS-PLAYER-2026-001-VIATEUR-APR-FC",


width:120,

height:120


});


</script>





</body>

</html>
