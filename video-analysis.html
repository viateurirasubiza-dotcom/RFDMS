<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>
RFDMS AI Video Analysis System
</title>


<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">


<style>


*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;

}


body{

background:
radial-gradient(circle,#14532d,#020617);

color:white;

padding:25px;

}



.header{

display:flex;

justify-content:space-between;

align-items:center;

background:
rgba(255,255,255,.08);

padding:25px;

border-radius:25px;

backdrop-filter:blur(20px);

}



.logo{

font-size:32px;

font-weight:900;

}


.logo span{

color:#22c55e;

}


.status{

background:#22c55e;

color:#020617;

padding:12px 25px;

border-radius:30px;

font-weight:bold;

}






.dashboard{

margin-top:30px;

display:grid;

grid-template-columns:2fr 1fr;

gap:25px;

}




.panel{

background:

rgba(255,255,255,.08);

padding:30px;

border-radius:30px;

}





h2{

color:#22c55e;

margin-bottom:20px;

}





video{

width:100%;

height:350px;

background:black;

border-radius:25px;

}






input{

margin-top:20px;

}





button{


padding:15px 25px;

border:none;

border-radius:25px;

background:#22c55e;

font-weight:bold;

cursor:pointer;

margin:5px;

}



button:hover{

box-shadow:0 0 20px #22c55e;

}





.cards{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(160px,1fr));

gap:15px;

}



.card{

background:
rgba(255,255,255,.08);

padding:20px;

border-radius:20px;

text-align:center;

}



.card i{

font-size:35px;

color:#22c55e;

}



.card h1{

margin-top:15px;

color:#22c55e;

}




.analysis{

background:
rgba(255,255,255,.08);

padding:15px;

border-radius:15px;

margin:15px 0;

display:flex;

justify-content:space-between;

}



.value{

color:#22c55e;

font-weight:bold;

font-size:20px;

}




.progress{

height:15px;

background:#334155;

border-radius:20px;

overflow:hidden;

}



.progress div{

height:100%;

background:#22c55e;

}





.ai-box{

background:
rgba(34,197,94,.15);

padding:25px;

border-radius:25px;

margin-top:20px;

}





.timeline{

margin-top:30px;

}



.event{

padding:15px;

background:
rgba(255,255,255,.08);

border-left:4px solid #22c55e;

margin:10px 0;

border-radius:10px;

}





@media(max-width:900px){

.dashboard{

grid-template-columns:1fr;

}

}



</style>


</head>


<body>



<div class="header">


<div class="logo">

🎥⚽

<span>
RFDMS AI VIDEO ANALYSIS
</span>


</div>



<div class="status">

AI ONLINE

</div>


</div>






<div class="dashboard">






<div class="panel">


<h2>

🎬 Match Video Center

</h2>




<video id="videoPlayer" controls>

</video>




<input 
type="file"
id="upload"
accept="video/*">






<br>


<button onclick="playVideo()">

▶ Play

</button>


<button onclick="pauseVideo()">

⏸ Pause

</button>


<button onclick="analyzeVideo()">

🤖 AI Analyze

</button>





<h2 style="margin-top:30px">

⏱ Match Clock

</h2>


<h1 id="clock">

00:00

</h1>






</div>









<div class="panel">


<h2>

🤖 AI Match Report

</h2>




<div class="analysis">

Attack Strength

<span class="value" id="attack">

0%

</span>

</div>




<div class="progress">

<div id="attackBar">

</div>

</div>






<div class="analysis">

Defense

<span class="value" id="defense">

0%

</span>

</div>


<div class="progress">

<div id="defenseBar">

</div>

</div>







<div class="analysis">

Passing Accuracy

<span class="value" id="passing">

0%

</span>

</div>



<div class="progress">

<div id="passingBar">

</div>

</div>







<div class="analysis">

Player Impact

<span class="value" id="impact">

0%

</span>

</div>






<div class="ai-box" id="report">


Waiting for AI Analysis...

</div>




</div>







</div>









<div class="panel timeline">


<h2>

🔥 AI Highlight Timeline

</h2>



<div id="events">

</div>


</div>







<script>



let video =
document.getElementById("videoPlayer");



let upload =
document.getElementById("upload");





upload.onchange=function(){


let file=this.files[0];


if(file){

video.src=
URL.createObjectURL(file);

}

};







function playVideo(){

video.play();

}



function pauseVideo(){

video.pause();

}






let time=0;


setInterval(()=>{


if(!video.paused){

time++;


let m=Math.floor(time/60);

let s=time%60;


document.getElementById("clock").innerHTML=

m+":"+

(s<10?"0":"")+s;


}


},1000);








function analyzeVideo(){


let attack=
Math.floor(Math.random()*15)+80;


let defense=
Math.floor(Math.random()*15)+80;


let passing=
Math.floor(Math.random()*15)+85;


let impact=
Math.floor(Math.random()*15)+85;



document.getElementById("attack").innerHTML=
attack+"%";


document.getElementById("defense").innerHTML=
defense+"%";


document.getElementById("passing").innerHTML=
passing+"%";


document.getElementById("impact").innerHTML=
impact+"%";





document.getElementById("attackBar").style.width=
attack+"%";


document.getElementById("defenseBar").style.width=
defense+"%";


document.getElementById("passingBar").style.width=
passing+"%";





document.getElementById("report").innerHTML=

`
🤖 AI Recommendation

<br><br>

✅ Strong attacking transitions

<br>

✅ Improve defensive positioning

<br>

✅ Midfielder controls game tempo

<br>

✅ High pressing strategy recommended

`;





generateEvents();


}








function generateEvents(){



let data=[


"⚽ 12:30 Goal Chance Detected",

"🔥 25:10 High Pressing Moment",

"🎯 41:22 Key Pass Found",

"🛡 67:05 Defensive Recovery",

"⭐ 82:15 Player Peak Performance"


];



let box=
document.getElementById("events");


box.innerHTML="";



data.forEach(item=>{


let div=document.createElement("div");


div.className="event";


div.innerHTML=item;


box.appendChild(div);


});


}




</script>



</body>

</html>
